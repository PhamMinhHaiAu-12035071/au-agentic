pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json,md}"
      run: bunx biome check --write {staged_files} --no-errors-on-unmatched
      stage_fixed: true
    typecheck:
      glob: "*.ts"
      run: bun run typecheck
    secretlint:
      glob: "*"
      run: bunx secretlint --maskSecrets --secretlintignore .secretlintignore {staged_files}
    knip:
      run: bunx knip --no-progress --no-exit-code

commit-msg:
  commands:
    commitlint:
      run: bunx --bun commitlint --edit {1}

pre-push:
  commands:
    knip-strict:
      run: bunx knip
