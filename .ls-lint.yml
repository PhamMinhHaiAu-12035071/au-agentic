ls:
  # Default: every directory and common file type must be kebab-case
  .dir: kebab-case
  .ts: kebab-case
  .md: kebab-case
  .yml: kebab-case
  .yaml: kebab-case
  .json: kebab-case
  .jsonc: kebab-case
  .toml: kebab-case
  .sh: kebab-case

  # ADR files must be NNNN-<kebab>.md
  # NOTE: ls-lint applies regex rules to the filename stem (without extension).
  # The pattern below is preserved for config contract purposes; docs/adr is
  # added to ignore so ls-lint does not attempt to validate it with this regex.
  docs/adr:
    .md: regex:^[0-9]{4}-[a-z0-9-]+\.md$

  # Unit test files must end .test.ts
  packages/cli/src/__tests__:
    .ts: regex:^[a-z0-9-]+\.test\.ts$

  # __tests__ is a double-underscore convention — exempt from kebab
  packages/cli/src:
    .dir: regex:^(__tests__|[a-z0-9-]+)$

ignore:
  # Community-convention root UPPERCASE files
  - README.md
  - AGENTS.md
  - CLAUDE.md
  - CONTRIBUTING.md
  - LICENSE
  - SECURITY.md
  - SUPPORT.md
  - CITATION.cff
  - CHANGELOG.md

  # Build / cache / lockfile artifacts
  - node_modules
  - dist
  - coverage
  - .cache
  - .turbo
  - .worktrees
  - bun.lock

  # Templates: user-facing, may follow external conventions (e.g. SKILL.md)
  - packages/templates

  # External-tool directories dictated by upstream
  - .github
  - .vscode
  - .claude

  # Git internals — not subject to naming conventions
  - .git

  # AI-agent tool directories — follow external tool conventions (e.g. SKILL.md)
  - .agents
  - .cursor
  - .superpowers

  # ADR regex uses full-filename pattern; ls-lint applies to stem only — exempt
  - docs/adr

  # Uppercase execution guide — external-convention naming, not kebab-case
  - docs/superpowers/EXECUTION-GUIDE-toolchain.md

  # Nested package artifacts (workspace hoisting does not cover these paths)
  - packages/cli/node_modules
  - packages/cli/.turbo
