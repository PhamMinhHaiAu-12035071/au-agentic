ls:
  # Default: every directory and common file type must be kebab-case
  .dir: kebab-case
  .ts: kebab-case
  .md: kebab-case
  .yml: kebab-case
  .yaml: kebab-case
  .json: kebab-case
  .jsonc: kebab-case
  .toml: kebab-case
  .sh: kebab-case

  # ADR files must be NNNN-<kebab>.md (ls-lint checks stem, extension filtered by .md key)
  docs/adr:
    .md: regex:^[0-9]{4}-[a-z0-9-]+$

  # Unit test files must end .test.ts
  packages/cli/src/__tests__:
    .ts: regex:^[a-z0-9-]+\.test\.ts$

  # __tests__ is a double-underscore convention — exempt from kebab.
  # NOTE: this override is not recursive; add a matching entry for each new packages/*/src.
  packages/cli/src:
    .dir: regex:^(__tests__|[a-z0-9-]+)$

  # Repo-root scripts/ may contain a __tests__ dir following the same convention.
  scripts:
    .dir: regex:^(__tests__|[a-z0-9-]+)$

  # Script tests: kebab .test.ts files live here.
  scripts/__tests__:
    .ts: regex:^[a-z0-9-]+\.test\.ts$

ignore:
  # Community-convention root UPPERCASE files
  - README.md
  - AGENTS.md
  - CLAUDE.md
  - CONTRIBUTING.md
  - LICENSE
  - SECURITY.md
  - SUPPORT.md
  - CITATION.cff
  - CHANGELOG.md

  # Build / cache / lockfile artifacts
  - node_modules
  - dist
  - coverage
  - .cache
  - .turbo
  - .worktrees
  - bun.lock

  # Templates: user-facing, may follow external conventions (e.g. SKILL.md)
  - packages/templates

  # External-tool directories dictated by upstream
  - .github
  - .vscode
  - .claude

  # Git internals — not subject to naming conventions
  - .git

  # Lefthook-generated hook directory (naming dictated by upstream tool)
  - .husky

  # Upstream-shaped fixture preserves original SKILL.md casing for realism
  - scripts/__tests__/fixtures/sample-upstream-SKILL.md

  # Tier 2 golden-file anchors: double-underscore convention mirrors __tests__
  - packages/cli/src/__tests__/__golden__

  # AI-agent tool directories — follow external tool conventions (e.g. SKILL.md)
  - .agents
  - .cursor
  - .superpowers

  # Uppercase execution guide — external-convention naming, not kebab-case
  - docs/superpowers/EXECUTION-GUIDE-toolchain.md

  # Nested package artifacts (workspace hoisting does not cover these paths)
  - packages/cli/node_modules
  - packages/cli/.turbo
